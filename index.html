<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compact Segmented UX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        .transition-all { transition-property: all; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 250ms; }
        body { transition: background-color 0.2s, color 0.2s; min-height: 200vh; }
        .glass { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        
        /* The search expansion logic */
        .search-container {
            width: 40px; /* Initial search icon width */
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
        }
        .search-container.active {
            width: 100%; /* Expands to fill the parent container */
        }
    </style>
</head>
<body class="bg-white dark:bg-black text-zinc-900 dark:text-white selection:bg-red-500/30 pt-2 px-6 overflow-x-hidden">

    <header class="sticky top-2 z-50 flex items-center justify-between max-w-6xl mx-auto h-12">
        
        <!-- Left: Branding (Transparent/Tight) -->
        <div id="branding" class="flex items-center gap-1 transition-opacity duration-200 cursor-pointer">
            <svg viewBox="0 0 28 20" width="28" height="20" xmlns="http://www.w3.org/2000/svg">
                <path d="M27.973 3.123s-.276-1.945-1.12-2.8c-1.07-1.122-2.27-1.127-2.82-1.193C20.086.033 14.004 0 14.004 0h-.008s-6.082.033-10.023.13C3.423.197 2.223.202 1.153 1.323c-.844.855-1.12 2.8-1.12 2.8S-.243 5.397-.243 7.67v2.12c0 2.274.276 4.548.276 4.548s.276 1.945 1.12 2.8c1.07 1.122 2.457 1.087 3.078 1.203 2.257.217 9.614.284 9.614.284s6.088-.01 10.03-.107c.55-.065 1.75-.07 2.82-1.192.844-.855 1.12-2.8 1.12-2.8s.277-2.274.277-4.548v-2.12c0-2.273-.277-4.547-.277-4.547z" fill="#FF0000"/>
                <path d="M11.125 5.613v8.774l7.604-4.387-7.604-4.387z" fill="#FFF"/>
            </svg>
            <span class="text-lg font-bold tracking-tighter ml-0.5">YouTube</span>
        </div>

        <!-- Center: The Interactive Zone (Natural Width) -->
        <div class="flex-1 flex justify-center px-4">
            <div id="interaction-group" class="relative flex items-center gap-2 h-10">
                
                <div id="tab-view" class="flex items-center gap-2 h-full transition-all duration-200">
                    <nav class="flex h-full glass bg-zinc-100/90 dark:bg-zinc-800/90 rounded-xl p-1 shadow-sm border border-zinc-200/50 dark:border-zinc-700/30">
                        <button onclick="setActiveTab('Home')" class="tab-btn group flex items-center gap-2 h-full px-3 rounded-lg text-[11px] font-semibold transition-all bg-white dark:bg-zinc-700 shadow-sm dark:text-white" data-tab="Home">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                            <span>Home</span>
                        </button>
                        <button onclick="setActiveTab('Shorts')" class="tab-btn group flex items-center gap-2 h-full px-3 rounded-lg text-[11px] font-medium transition-all text-zinc-500 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white" data-tab="Shorts">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
                            <span>Shorts</span>
                        </button>
                        <button onclick="setActiveTab('Subscriptions')" class="tab-btn group flex items-center gap-2 h-full px-3 rounded-lg text-[11px] font-medium transition-all text-zinc-500 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white" data-tab="Subscriptions">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                            <span>Subscriptions</span>
                        </button>
                        <button onclick="setActiveTab('Me')" class="tab-btn group flex items-center gap-2 h-full px-3 rounded-lg text-[11px] font-medium transition-all text-zinc-500 dark:text-zinc-300 hover:text-zinc-900 dark:hover:text-white" data-tab="Me">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                            <span>Me</span>
                        </button>
                    </nav>

                    <!-- Search Icon Trigger Segment -->
                    <button id="open-search" class="glass h-10 w-10 flex items-center justify-center bg-zinc-100/90 dark:bg-zinc-800/90 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-xl transition-all active:scale-95 group shadow-sm border border-zinc-200/50 dark:border-zinc-700/30">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-500 dark:text-zinc-300 group-hover:text-zinc-900 dark:group-hover:text-white"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </button>
                </div>

                <div id="search-view" class="absolute right-0 opacity-0 pointer-events-none search-container flex items-center glass bg-zinc-100/95 dark:bg-zinc-800/95 rounded-xl h-10 px-1 shadow-xl border border-zinc-300 dark:border-zinc-600 z-10">
                    <button id="close-search" class="p-1.5 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-lg transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-500 dark:text-zinc-300"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <input id="search-input" type="text" placeholder="Search" class="flex-1 bg-transparent border-none outline-none px-2 text-sm font-medium placeholder-zinc-400 dark:placeholder-zinc-500 text-zinc-900 dark:text-white">
                    <button id="clear-search" class="hidden p-1.5 hover:bg-zinc-200 dark:hover:bg-zinc-700 rounded-lg transition-colors mr-0.5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-400 hover:text-zinc-900 dark:hover:text-white"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- Right: Profile (Transparent Avatar) -->
        <div class="relative flex items-center">
            <button id="avatar-btn" class="w-8 h-8 rounded-full overflow-hidden active:scale-95 transition-transform flex-shrink-0">
                <div class="w-full h-full bg-gradient-to-tr from-indigo-500 to-purple-500"></div>
            </button>

            <!-- Theme Settings Dropdown -->
            <div id="settings-menu" class="hidden absolute top-10 right-0 w-48 glass bg-white/95 dark:bg-zinc-900/95 border border-zinc-200 dark:border-zinc-800 rounded-xl shadow-2xl z-[60] overflow-hidden">
                <button onclick="setTheme('light')" class="w-full px-4 py-3 text-left text-sm flex items-center gap-3 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors">
                    Light Mode
                </button>
                <button onclick="setTheme('dark')" class="w-full px-4 py-3 text-left text-sm flex items-center gap-3 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition-colors">
                    Dark Mode
                </button>
            </div>
        </div>
    </header>

    <main class="p-6 pt-12 max-w-6xl mx-auto">
        <div class="mb-8">
            <h2 id="active-tab-title" class="text-2xl font-bold mb-2">Home</h2>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <script>
                for(let i=0; i<12; i++) {
                    document.write(`
                        <div class="group cursor-pointer">
                            <div class="aspect-video bg-zinc-100 dark:bg-zinc-900 rounded-xl overflow-hidden mb-3 border border-zinc-200 dark:border-zinc-800"></div>
                            <div class="flex gap-3">
                                <div class="w-9 h-9 rounded-full bg-zinc-100 dark:bg-zinc-900 flex-shrink-0"></div>
                                <div class="flex-1">
                                    <div class="h-4 w-[90%] bg-zinc-200 dark:bg-zinc-800 rounded-md mb-2"></div>
                                    <div class="h-3 w-1/2 bg-zinc-100 dark:bg-zinc-800/50 rounded-md"></div>
                                </div>
                            </div>
                        </div>
                    `);
                }
            </script>
        </div>
    </main>

    <div id="overlay" class="fixed inset-0 bg-black/5 dark:bg-black/20 backdrop-blur-[1px] z-40 transition-opacity hidden"></div>

    <script>
        const tabView = document.getElementById('tab-view');
        const searchView = document.getElementById('search-view');
        const searchInput = document.getElementById('search-input');
        const overlay = document.getElementById('overlay');
        const clearBtn = document.getElementById('clear-search');
        const branding = document.getElementById('branding');
        const avatarBtn = document.getElementById('avatar-btn');
        const settingsMenu = document.getElementById('settings-menu');

        function toggleSearch(isSearching) {
            if (isSearching) {
                // Fade out branding and tabs
                branding.classList.add('opacity-0');
                tabView.classList.add('opacity-0', 'pointer-events-none');
                
                // Expand search box from right to left
                searchView.classList.remove('opacity-0', 'pointer-events-none');
                searchView.classList.add('opacity-100', 'active');
                
                overlay.classList.remove('hidden');
                setTimeout(() => searchInput.focus(), 300);
            } else {
                searchView.classList.remove('active', 'opacity-100');
                searchView.classList.add('opacity-0', 'pointer-events-none');
                
                branding.classList.remove('opacity-0');
                tabView.classList.remove('opacity-0', 'pointer-events-none');
                
                overlay.classList.add('hidden');
                searchInput.value = '';
                clearBtn.classList.add('hidden');
            }
        }

        function setActiveTab(tabName) {
            document.getElementById('active-tab-title').innerText = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => {
                const isActive = btn.getAttribute('data-tab') === tabName;
                btn.classList.toggle('bg-white', isActive);
                btn.classList.toggle('dark:bg-zinc-700', isActive);
                btn.classList.toggle('shadow-sm', isActive);
                btn.classList.toggle('font-semibold', isActive);
                btn.classList.toggle('text-zinc-500', !isActive);
                btn.classList.toggle('dark:text-zinc-300', !isActive);
            });
        }

        function setTheme(mode) {
            document.documentElement.classList.toggle('dark', mode === 'dark');
            settingsMenu.classList.add('hidden');
        }

        // Event Listeners
        document.getElementById('open-search').addEventListener('click', () => toggleSearch(true));
        document.getElementById('close-search').addEventListener('click', () => toggleSearch(false));
        overlay.addEventListener('click', () => { toggleSearch(false); settingsMenu.classList.add('hidden'); });
        avatarBtn.addEventListener('click', (e) => { e.stopPropagation(); settingsMenu.classList.toggle('hidden'); });
        window.addEventListener('click', () => settingsMenu.classList.add('hidden'));

        searchInput.addEventListener('input', (e) => clearBtn.classList.toggle('hidden', e.target.value.length === 0));
        clearBtn.addEventListener('click', () => { searchInput.value = ''; clearBtn.classList.add('hidden'); searchInput.focus(); });
    </script>
</body>
</html>
